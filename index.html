<!doctype html>
<html>

<head>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <!-- Your HTML here -->

    <h1>PollyGlot</h1>
    <h5>Perfect translation every time</h5>

    <label>Text to translate</label>
    <textarea id="input" placeholder="Enter text to translate..."></textarea>
    <label>select language</label>
    <input type="radio" name="language" value="french" id="french">French</input>
    <label for="french"></label>
    <input type="radio" name="language" value="spanish" id="spanish">Spanish</input>
    <label for="spanish"></label>
    <input type="radio" name="language" value="japanese" id="japanese">Japanese</input>
    <label for="japanese"></label>





    <button id="translate">Translate</button>






    <script src="index.js" type="module"></script>
</body>

</html>
