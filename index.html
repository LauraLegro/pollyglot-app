<!doctype html>
<html>

<head>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <!-- Your HTML here -->
    <div class="app">
        <div class="container">
            <div class="header">
                <img src="assets/parrot.png" alt="PollyGlot Logo" class="logo">
                <div class="header-text">
                    <h1>PollyGlot</h1>
                    <span id="tagline">Perfect translation every time</span>

                </div>


            </div>
            <div class="form">
                <h3> Text to translate </h3>
                <textarea id="input" placeholder="Enter text to translate..."></textarea>
                <h3> Select language </h3>

                <div class="language">
                    <input type="radio" name="language" value="french" id="french">
                    <label for="french">French</label>
                    <img src="assets/fr-flag.png" class="flag" />
                </div>
                <div class="language">
                    <input type="radio" name="language" value="spanish" id="spanish">
                    <label for="spanish">Spanish</label>
                    <img src="assets/sp-flag.png" class="flag" />
                </div>
                <div class="language">
                    <input type="radio" name="language" value="japanese" id="japanese">
                    <label for="japanese">Japanese</label>
                    <img src="assets/jpn-flag.png" class="flag" />
                </div>
                <button id="translate">Translate</button>
            </div>

        </div>
    </div>
    <script src="index.js" type="module">
    </script>
</body>


</html>
